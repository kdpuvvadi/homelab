http:
  routers:
    proxmox:
      entryPoints:
        - "https"
      rule: "Host(`pve.home.puvvadi.net`)"
      middlewares:
        - default-headers
        - https-redirectscheme
      tls: {}
      service: proxmox

    ui:
      entryPoints:
        - "https"
      rule: "Host(`ui.local.puvvadi.net`)"
      middlewares:
        - default-headers
        - https-redirectscheme
      tls: {}
      service: ui

    blog-local:
      entryPoints:
        - "https"
      rule: "Host(`blog.local.puvvadi.net`)"
      middlewares:
        - default-headers
        - https-redirectscheme
      tls: {}
      service: blog@docker

  services:
    proxmox:
      loadBalancer:
        servers:
          - url: "https://10.20.20.104:8006"
        passHostHeader: true

    ui:
      loadBalancer:
        servers:
          - url: "https://192.168.0.1"
        passHostHeader: true


  middlewares:
    https-redirectscheme:
      redirectScheme:
        scheme: https
        permanent: true

    default-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https

    default-whitelist:
      ipAllowList:
        sourceRange:
        - "10.0.0.0/8"
        - "192.168.0.0/16"
        - "172.16.0.0/12"
        - "100.64.0.0/10"

    secured:
      chain:
        middlewares:
        - default-headers
